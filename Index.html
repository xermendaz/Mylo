<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PixelForge</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0e14;--surface:#161822;--surface2:#1e2030;--border:#2a2d45;
  --accent:#ff6b35;--accent2:#00d4ff;--text:#e8eaf0;--muted:#5a5f80;
  --danger:#ff3a5e;--font:'Space Mono',monospace;--display:'Silkscreen',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;font-size:11px;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.82);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(6px);padding:16px;}
.modal-overlay.hidden{display:none;}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:28px;width:100%;max-width:480px;box-shadow:0 40px 80px rgba(0,0,0,0.7);}
.modal-box.wide{max-width:820px;max-height:85vh;overflow-y:auto;}
.modal-title{font-family:var(--display);font-size:20px;color:var(--accent);letter-spacing:4px;margin-bottom:6px;}
.modal-sub{color:var(--muted);font-size:11px;margin-bottom:24px;}
.setup-row{margin-bottom:20px;}
.setup-row>label{display:block;color:var(--muted);font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
.btn-group{display:flex;flex-wrap:wrap;gap:6px;}
.sg-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:11px;padding:6px 12px;border-radius:3px;cursor:pointer;transition:all .15s;}
.sg-btn:hover{border-color:var(--accent);color:var(--accent);}
.sg-btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700;}
.custom-size-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.custom-size-row input{width:64px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:12px;padding:6px 8px;border-radius:3px;outline:none;}
.custom-size-row input:focus{border-color:var(--accent2);}
.custom-size-row span{color:var(--muted);}
.custom-size-row button{background:var(--surface2);border:1px solid var(--border);color:var(--accent2);font-family:var(--font);font-size:11px;padding:6px 12px;border-radius:3px;cursor:pointer;}
.custom-size-row button:hover{background:var(--accent2);color:#000;}
.preview-info{font-family:var(--display);font-size:13px;color:var(--accent2);letter-spacing:1px;}
.start-btn{display:block;width:100%;margin-top:20px;background:var(--accent);border:none;color:#000;font-family:var(--display);font-size:14px;letter-spacing:3px;padding:14px;border-radius:3px;cursor:pointer;transition:opacity .15s;}
.start-btn:hover{opacity:.85;}

/* App */
#app{display:flex;flex-direction:column;height:100vh;}
#app.hidden{display:none;}

/* Toolbar */
#toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;flex-wrap:wrap;align-items:center;gap:6px;flex-shrink:0;}
.tb-section{display:flex;align-items:center;gap:5px;flex-wrap:nowrap;}
.tb-sep{width:1px;height:24px;background:var(--border);margin:0 2px;flex-shrink:0;}
@media(max-width:600px){.tb-sep{display:none;}}
.logo{font-family:var(--display);font-size:15px;color:var(--accent);letter-spacing:2px;}
.tb-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:10px;padding:5px 9px;border-radius:3px;cursor:pointer;white-space:nowrap;transition:all .12s;letter-spacing:.5px;line-height:1.2;}
.tb-btn:hover{border-color:var(--muted);color:#fff;}
.tb-btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700;}
.tb-btn.accent{background:var(--accent2);border-color:var(--accent2);color:#000;}
.tb-btn.accent:hover{opacity:.8;}
.tb-btn.danger{color:var(--danger);border-color:var(--danger);}
.tb-btn.danger:hover{background:var(--danger);color:#fff;}
.tb-btn.sm{padding:4px 7px;}
.tool-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:14px;width:30px;height:30px;border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0;}
.tool-btn:hover{border-color:var(--accent);}
.tool-btn.active{background:var(--accent);border-color:var(--accent);color:#000;}

/* Color section */
.color-section{display:flex;align-items:center;gap:5px;}
.color-swatch-wrap{position:relative;cursor:pointer;}
.color-swatch{width:28px;height:28px;border-radius:4px;border:2px solid var(--border);}
.color-swatch-wrap input[type=color]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.hex-input{width:66px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:10px;padding:4px 6px;border-radius:3px;outline:none;letter-spacing:1px;}
.hex-input:focus{border-color:var(--accent2);}

/* Palette — horizontal scroll, no wrap */
#paletteWrap{display:flex;align-items:center;gap:4px;max-width:180px;overflow-x:auto;overflow-y:hidden;scrollbar-width:thin;scrollbar-color:var(--border) transparent;flex-shrink:0;}
#paletteWrap::-webkit-scrollbar{height:3px;}
#paletteWrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
#palette{display:flex;gap:3px;align-items:center;flex-shrink:0;}
.pal-swatch{width:20px;height:20px;border-radius:3px;cursor:pointer;border:2px solid transparent;transition:transform .1s,border-color .1s;flex-shrink:0;}
.pal-swatch:hover{transform:scale(1.2);border-color:rgba(255,255,255,.4);}
.pal-swatch.active{border-color:#fff;transform:scale(1.15);box-shadow:0 0 0 1px var(--accent);}

/* Zoom */
.zoom-lbl{font-family:var(--display);font-size:11px;color:var(--accent2);min-width:42px;text-align:center;}

/* Canvas area */
#canvasArea{flex:1;overflow:hidden;position:relative;background:var(--bg);touch-action:none;}
#canvasWrap{position:absolute;transform-origin:0 0;user-select:none;}
#pixelCanvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;cursor:crosshair;}

/* Coordinates */
.coords{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);border:1px solid var(--border);color:var(--accent2);font-family:var(--display);font-size:10px;padding:4px 12px;border-radius:3px;pointer-events:none;letter-spacing:1px;}

/* Text tool popup */
.text-pop{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--accent);border-radius:4px;padding:14px 16px;z-index:200;min-width:240px;}
.text-pop.hidden{display:none;}
.text-pop-title{font-family:var(--display);font-size:11px;color:var(--accent);letter-spacing:2px;margin-bottom:10px;}
.text-pop-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:10px;color:var(--muted);}
.text-pop-row label{min-width:90px;}
.text-pop-row input[type=range]{flex:1;accent-color:var(--accent);}
.text-pop-row button{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:10px;padding:5px 14px;border-radius:3px;cursor:pointer;}
.text-input{position:absolute;background:rgba(0,0,0,.85);border:1px solid var(--accent);color:#fff;font-family:var(--display);font-size:13px;padding:4px 8px;border-radius:3px;outline:none;z-index:100;min-width:100px;}
.text-input.hidden{display:none;}

/* Library */
.lib-actions{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.lib-actions button{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:11px;padding:7px 14px;border-radius:3px;cursor:pointer;}
.lib-actions button:hover{border-color:var(--accent);color:var(--accent);}
.lib-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;max-height:260px;overflow-y:auto;margin-bottom:16px;}
.lib-item{background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:8px;cursor:pointer;text-align:center;transition:border-color .15s;}
.lib-item:hover{border-color:var(--accent);}
.lib-item-name{font-family:var(--display);font-size:9px;color:var(--accent2);letter-spacing:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lib-json{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--accent2);font-family:var(--font);font-size:10px;padding:10px;border-radius:3px;resize:vertical;outline:none;min-height:60px;}

/* Push */
.push-form input.push-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:12px;padding:8px 12px;border-radius:3px;outline:none;}
.push-form input.push-input:focus{border-color:var(--accent2);}
.push-actions{display:flex;gap:8px;margin-top:14px;align-items:center;flex-wrap:wrap;}
.push-actions button{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:11px;padding:7px 14px;border-radius:3px;cursor:pointer;}
.push-actions button:hover{border-color:var(--accent);color:var(--accent);}

/* Export dropdown */
.export-wrap{position:relative;}
.dropdown{display:none;position:absolute;top:calc(100% + 6px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:3px;overflow:hidden;z-index:300;min-width:130px;box-shadow:0 10px 30px rgba(0,0,0,.6);}
.dropdown.open{display:block;}
.dropdown button{display:block;width:100%;background:none;border:none;color:var(--text);font-family:var(--font);font-size:11px;padding:10px 14px;text-align:left;cursor:pointer;}
.dropdown button:hover{background:var(--surface2);color:var(--accent);}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--muted);}

/* View mode hides */
body.view-mode #toolsGroup,
body.view-mode .color-section,
body.view-mode #paletteWrap,
body.view-mode #addPaletteBtn,
body.view-mode #unpaintBtn,
body.view-mode #clearBtn,
body.view-mode #selectToggleBtn,
body.view-mode #textPop{display:none;}
body.view-mode #canvasArea{cursor:default;}

/* Mobile */
@media(max-width:700px){
  #toolbar{padding:6px 8px;gap:5px;}
  .tb-btn{font-size:9px;padding:4px 7px;}
  .tool-btn{width:26px;height:26px;font-size:12px;}
  .color-swatch{width:24px;height:24px;}
  .hex-input{width:56px;}
  #paletteWrap{max-width:120px;}
  .pal-swatch{width:16px;height:16px;}
  .zoom-lbl{min-width:34px;font-size:10px;}
  .modal-box{padding:20px 16px;}
  .modal-title{font-size:16px;}
}
@media(max-width:480px){
  .tb-btn.hide-mobile{display:none;}
  .logo{font-size:13px;}
  .hex-input{display:none;}
}
</style>
</head>
<body>

<!-- Setup Modal -->
<div id="setupModal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-title">PIXELFORGE</div>
    <div class="modal-sub">Configure your canvas</div>
    <div class="setup-row">
      <label>Canvas Size</label>
      <div class="btn-group" id="sizeGroup">
        <button class="sg-btn active" data-val="8">8×8</button>
        <button class="sg-btn" data-val="16">16×16</button>
        <button class="sg-btn" data-val="24">24×24</button>
        <button class="sg-btn" data-val="32">32×32</button>
        <button class="sg-btn" data-val="48">48×48</button>
        <button class="sg-btn" data-val="64">64×64</button>
      </div>
    </div>
    <div class="setup-row">
      <label>Custom Size</label>
      <div class="custom-size-row">
        <input type="number" id="customW" min="2" max="128" placeholder="W">
        <span>×</span>
        <input type="number" id="customH" min="2" max="128" placeholder="H">
        <button id="customApply">Apply</button>
      </div>
    </div>
    <div class="setup-row">
      <label>Preview</label>
      <div class="preview-info" id="previewInfo">8 × 8 pixels — 64 cells</div>
    </div>
    <button id="startBtn" class="start-btn">START DRAWING →</button>
  </div>
</div>

<!-- Main App -->
<div id="app" class="hidden">
  <header id="toolbar">
    <div class="tb-section">
      <div class="logo">PF</div>
      <div class="tb-sep"></div>
      <button class="tb-btn active" id="editModeBtn">✏ EDIT</button>
      <button class="tb-btn" id="viewModeBtn">👁 VIEW</button>
    </div>
    <div class="tb-sep"></div>
    <div class="tb-section" id="toolsGroup">
      <button class="tool-btn active" data-tool="paint" title="Paint (P)">🪣</button>
      <button class="tool-btn" data-tool="erase" title="Erase (R)">◻</button>
      <button class="tool-btn" data-tool="fill" title="Fill (F)">⬛</button>
      <button class="tool-btn" data-tool="eyedrop" title="Eyedropper (K)">💉</button>
      <button class="tool-btn" data-tool="text" title="Text (T)">𝐓</button>
      <button class="tb-btn" id="selectToggleBtn" title="Select area (drag to draw)">⬚ SELECT</button>
      <button class="tb-btn" id="moveToggleBtn" title="Move selected pixels">✥ MOVE</button>
      <button class="tb-btn" id="copyBtn" title="Copy selection (Ctrl+C)">⎘ COPY</button>
      <button class="tb-btn" id="pasteBtn" title="Paste (Ctrl+V)">⎘ PASTE</button>
    </div>
    <div class="tb-sep"></div>
    <div class="tb-section color-section">
      <div class="color-swatch-wrap" title="Pick color">
        <div id="colorSwatch" class="color-swatch"></div>
        <input type="color" id="colorPicker" value="#111111">
      </div>
      <input type="text" id="colorHex" class="hex-input" value="#111111" maxlength="7">
    </div>
    <div class="tb-sep"></div>
    <div class="tb-section">
      <div id="paletteWrap"><div id="palette"></div></div>
      <button class="tb-btn sm" id="addPaletteBtn" title="Add current color to palette">+</button>
    </div>
    <div class="tb-sep"></div>
    <div class="tb-section">
      <button class="tb-btn" id="unpaintBtn">⌫ UNDO</button>
      <button class="tb-btn danger" id="clearBtn">✕ CLEAR</button>
    </div>
    <div class="tb-sep"></div>
    <div class="tb-section">
      <button class="tb-btn" id="ghostBtn" title="Ghost / onion skin">👻</button>
      <div class="tb-sep"></div>
      <button class="tb-btn sm" id="panLeftBtn" title="Pan left (<)">&lt;</button>
      <button class="tb-btn sm" id="panUpBtn" title="Pan up">↑</button>
      <button class="tb-btn sm" id="zoomOutBtn" title="Zoom out (-)">−</button>
      <span id="zoomLbl" class="zoom-lbl">100%</span>
      <button class="tb-btn sm" id="zoomInBtn" title="Zoom in (+)">+</button>
      <button class="tb-btn sm" id="panDownBtn" title="Pan down">↓</button>
      <button class="tb-btn sm" id="panRightBtn" title="Pan right (>)">&gt;</button>
      <button class="tb-btn sm hide-mobile" id="zoomFitBtn">FIT</button>
    </div>
    <div class="tb-sep"></div>
    <div class="tb-section">
      <button class="tb-btn hide-mobile" id="libraryBtn">📚 LIB</button>
      <button class="tb-btn accent" id="pushBtn">⬆ PUSH</button>
      <div class="export-wrap">
        <button class="tb-btn accent" id="exportBtn">⬇ EXPORT ▾</button>
        <div id="exportMenu" class="dropdown">
          <button id="exportPNG">PNG</button>
          <button id="exportSVG">SVG</button>
        </div>
      </div>
      <button class="tb-btn sm" id="newBtn">⊕ NEW</button>
    </div>
  </header>

  <main id="canvasArea">
    <div id="canvasWrap">
      <canvas id="pixelCanvas"></canvas>
    </div>
    <input type="text" id="textInput" class="text-input hidden" placeholder="Type…">
    <div id="coords" class="coords">—</div>
  </main>
</div>

<!-- Library Modal -->
<div id="libraryModal" class="modal-overlay hidden">
  <div class="modal-box wide">
    <div class="modal-title">LIBRARY</div>
    <div class="lib-actions">
      <button id="libCloseBtn">✕ Close</button>
    </div>
    <div id="libGrid" class="lib-grid"></div>
    <div style="color:var(--muted);font-size:10px;margin-bottom:6px;letter-spacing:1px;">PASTE JSON OR A URL (https://…/shape.json)</div>
    <textarea id="libJsonArea" class="lib-json" placeholder="Paste JSON here or enter a URL like https://example.com/sprite.json then click Import"></textarea>
    <button id="libConfirmImport" class="start-btn" style="margin-top:10px;">IMPORT →</button>
  </div>
</div>

<!-- Push Modal -->
<div id="pushModal" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-title">PUSH TO LIBRARY</div>
    <div class="push-form">
      <input type="text" id="pushName" placeholder="Sprite name…" class="push-input">
      <textarea id="pushJson" class="lib-json" readonly style="height:120px;margin-top:12px;"></textarea>
    </div>
    <div class="push-actions">
      <button id="pushCopyBtn">📋 Copy JSON</button>
      <button id="pushSaveBtn" class="start-btn" style="margin:0;flex:1;">SAVE</button>
      <button id="pushCloseBtn">✕</button>
    </div>
  </div>
</div>

<!-- Text tool popup -->
<div id="textPop" class="text-pop hidden">
  <div class="text-pop-title">TEXT TOOL</div>
  <div class="text-pop-row">
    <label>Font size</label>
    <input type="range" id="textFontSize" min="6" max="48" value="12">
    <span id="textFontSizeVal">12</span>
  </div>
  <div class="text-pop-row">
    <label>Color</label>
    <input type="color" id="textColorPick" value="#ffffff">
  </div>
  <div class="text-pop-row">
    <button id="textPopClose">Done ✓</button>
  </div>
</div>

<!-- Mobile library button -->
<button id="libMobileBtn" style="display:none;position:fixed;bottom:50px;right:14px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'Space Mono',monospace;font-size:11px;padding:8px 12px;border-radius:4px;cursor:pointer;z-index:50;">📚</button>

<script>
if(window.innerWidth<=700)document.getElementById('libMobileBtn').style.display='block';
window.addEventListener('resize',function(){document.getElementById('libMobileBtn').style.display=window.innerWidth<=700?'block':'none';});
document.getElementById('libMobileBtn').addEventListener('click',function(){document.getElementById('libraryBtn').click();});
</script>

<script>
/* ================================================================
   PixelForge — app.js  (full rewrite with all fixes)
   ================================================================ */

/* ── State ── */
var COLS=8,ROWS=8,CELL=40;
var pixels=[];
var undoStack=[];
var palette=['#111111','#ffffff','#ff6b35','#00d4ff','#ff3a5e','#a8e063','#ffd700','#8b5cf6','#f97316','#06b6d4'];
var library=[];
var currentColor=palette[0];
var currentTool='paint';
var vpScale=1,vpX=0,vpY=0;
var isPainting=false,isDragSelecting=false,dragSelectStart=null,lastPainted=-1;
// Select state
var selectRect=null,selectActive=false;
// selectMode: 'idle' | 'drawing' | 'handle' | 'moving' | 'pasting'
var selectMode='idle';
var selectDrawStart=null;
var selectHandleIdx=-1;
var selectDragAnchorPx=null,selectInitRect=null;
var selectMoveDragAnchorPx=null,selectMoveInitRect=null;
var clipboard=null;
var pasteRect=null;
var pasteDragAnchorPx=null,pasteMoveInitRect=null;
var _pendingPasteCommit=false;
// Move tool state
var moveActive=false;
var moveDragAnchorPx=null,moveInitPixels=null,moveInitRect=null;
var ghostData=null,viewMode=false;
var textFontSize=12,textColor='#ffffff',textPending=null;
var cursorCol=0,cursorRow=0,cursorVisible=false;

/* ── DOM ── */
var canvas=document.getElementById('pixelCanvas');
var ctx=canvas.getContext('2d');
var canvasWrap=document.getElementById('canvasWrap');
var canvasArea=document.getElementById('canvasArea');
var coordsEl=document.getElementById('coords');
var colorSwatch=document.getElementById('colorSwatch');
var colorPicker=document.getElementById('colorPicker');
var colorHex=document.getElementById('colorHex');
var textInput=document.getElementById('textInput');

/* ═══════════════════════════════════════════
   SETUP MODAL
═══════════════════════════════════════════ */
(function setupModal(){
  var btns=document.querySelectorAll('.sg-btn');
  var previewInfo=document.getElementById('previewInfo');
  function setPreview(w,h){
    COLS=w;ROWS=h;
    previewInfo.textContent=w+' × '+h+' pixels — '+(w*h)+' cells';
    btns.forEach(function(b){b.classList.toggle('active',+b.dataset.val===w&&w===h);});
  }
  btns.forEach(function(b){
    b.addEventListener('click',function(){
      setPreview(+b.dataset.val,+b.dataset.val);
      document.getElementById('customW').value='';
      document.getElementById('customH').value='';
    });
  });
  document.getElementById('customApply').addEventListener('click',function(){
    var w=parseInt(document.getElementById('customW').value)||0;
    var h=parseInt(document.getElementById('customH').value)||0;
    if(w>=2&&h>=2&&w<=128&&h<=128)setPreview(w,h);
  });
  document.getElementById('startBtn').addEventListener('click',function(){
    document.getElementById('setupModal').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    initCanvas(COLS,ROWS);
  });
})();

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
function initCanvas(cols,rows){
  COLS=cols;ROWS=rows;
  pixels=new Array(cols*rows).fill(null);
  undoStack=[];ghostData=null;selectRect=null;selectActive=false;selectMode='idle';pasteRect=null;clipboard=null;
  moveActive=false;
  document.getElementById('selectToggleBtn').classList.remove('active');
  cursorCol=0;cursorRow=0;cursorVisible=false;
  autoFitZoom();renderAll();
  buildPaletteUI();
  setColor(palette[0]||'#111111');
  updateCopyPasteBtns();
}

function autoFitZoom(){
  var pad=48,areaW=canvasArea.clientWidth-pad,areaH=canvasArea.clientHeight-pad;
  vpScale=Math.max(0.5,Math.min(24,Math.min(areaW/(COLS*CELL),areaH/(ROWS*CELL))));
  centerCanvas();
}
function centerCanvas(){
  vpX=Math.round((canvasArea.clientWidth-COLS*CELL*vpScale)/2);
  vpY=Math.round((canvasArea.clientHeight-ROWS*CELL*vpScale)/2);
  applyTransform();
}
function applyTransform(){
  canvasWrap.style.transform='translate('+vpX+'px,'+vpY+'px) scale('+vpScale+')';
  canvasWrap.style.transformOrigin='0 0';
  document.getElementById('zoomLbl').textContent=Math.round(vpScale*100)+'%';
}

/* ═══════════════════════════════════════════
   RENDER
   Sharp canvas: logical size = COLS*CELL, displayed via CSS transform/scale.
   We multiply by devicePixelRatio for crisp rendering on HiDPI screens.
═══════════════════════════════════════════ */
function renderAll(){
  var dpr=window.devicePixelRatio||1;
  var logW=COLS*CELL,logH=ROWS*CELL;
  // Physical pixel size
  canvas.width=logW*dpr;
  canvas.height=logH*dpr;
  // CSS size stays logical
  canvas.style.width=logW+'px';
  canvas.style.height=logH+'px';

  ctx.save();
  ctx.scale(dpr,dpr);

  // White background
  ctx.fillStyle='#ffffff';
  ctx.fillRect(0,0,logW,logH);

  // Pixels
  for(var i=0;i<pixels.length;i++){
    if(!pixels[i])continue;
    ctx.fillStyle=pixels[i];
    ctx.fillRect((i%COLS)*CELL,Math.floor(i/COLS)*CELL,CELL,CELL);
  }

  // Ghost
  if(ghostData){
    ctx.save();ctx.globalAlpha=0.28;
    for(var gi=0;gi<ghostData.length;gi++){
      if(!ghostData[gi])continue;
      ctx.fillStyle=ghostData[gi];
      ctx.fillRect((gi%COLS)*CELL,Math.floor(gi/COLS)*CELL,CELL,CELL);
    }
    ctx.restore();
  }

  // Grid lines (edit mode only)
  if(!viewMode){
    ctx.strokeStyle='rgba(0,0,0,0.15)';
    ctx.lineWidth=0.5;
    for(var c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*CELL,0);ctx.lineTo(c*CELL,logH);ctx.stroke();}
    for(var r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*CELL);ctx.lineTo(logW,r*CELL);ctx.stroke();}
  }

  // Select overlay
  if(selectActive&&selectRect)drawSelectOverlay();

  // WASD cursor
  if(cursorVisible&&!viewMode)drawWASDCursor();

  ctx.restore();
}

function drawSelectOverlay(){
  var s=selectRect;
  if(!s)return;
  var x=s.col*CELL,y=s.row*CELL,w=s.cols*CELL,h=s.rows*CELL;
  var logW=COLS*CELL,logH=ROWS*CELL;
  ctx.save();
  // Dim outside
  ctx.fillStyle='rgba(0,0,0,0.42)';
  ctx.fillRect(0,0,logW,logH);
  // Punch out & redraw inside
  ctx.fillStyle='#ffffff';ctx.fillRect(x,y,w,h);
  for(var i=0;i<pixels.length;i++){
    if(!pixels[i])continue;
    var pc=i%COLS,pr=Math.floor(i/COLS);
    if(pc<s.col||pc>=s.col+s.cols||pr<s.row||pr>=s.row+s.rows)continue;
    ctx.fillStyle=pixels[i];ctx.fillRect(pc*CELL,pr*CELL,CELL,CELL);
  }
  // Dashed marching ants border
  var t=(Date.now()/60)%20;
  ctx.strokeStyle='#00d4ff';ctx.lineWidth=1.5;ctx.setLineDash([5,4]);ctx.lineDashOffset=-t;
  ctx.strokeRect(x+0.75,y+0.75,w-1.5,h-1.5);ctx.setLineDash([]);ctx.lineDashOffset=0;
  // Corner handles — larger, easier to grab
  var HR=6;
  [[x,y],[x+w,y],[x+w,y+h],[x,y+h]].forEach(function(pt,hi){
    ctx.beginPath();ctx.arc(pt[0],pt[1],HR,0,Math.PI*2);
    ctx.fillStyle='#fff';ctx.fill();
    ctx.strokeStyle='#00d4ff';ctx.lineWidth=2;ctx.stroke();
  });
  // Edge midpoint handles
  [[x+w/2,y],[x+w,y+h/2],[x+w/2,y+h],[x,y+h/2]].forEach(function(pt){
    ctx.beginPath();ctx.arc(pt[0],pt[1],4,0,Math.PI*2);
    ctx.fillStyle='#fff';ctx.fill();
    ctx.strokeStyle='#00d4ff';ctx.lineWidth=1.5;ctx.stroke();
  });
  // Size label
  ctx.font='bold 10px "Space Mono",monospace';
  ctx.fillStyle='#00d4ff';ctx.textAlign='center';ctx.textBaseline='top';
  ctx.shadowColor='#000';ctx.shadowBlur=3;
  ctx.fillText(s.cols+'×'+s.rows,x+w/2,y+h+6);
  ctx.shadowBlur=0;
  ctx.restore();

  // Paste ghost on top
  if(selectMode==='pasting'&&pasteRect&&clipboard){
    drawPasteGhost();
  }
}

function drawPasteGhost(){
  var p=pasteRect;
  ctx.save();
  ctx.globalAlpha=0.72;
  for(var r=0;r<p.rows;r++)for(var c=0;c<p.cols;c++){
    var pi2=r*clipboard.cols+c;
    if(!clipboard.pixels[pi2])continue;
    ctx.fillStyle=clipboard.pixels[pi2];
    ctx.fillRect((p.col+c)*CELL,(p.row+r)*CELL,CELL,CELL);
  }
  ctx.globalAlpha=1;
  ctx.strokeStyle='#ff6b35';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
  ctx.strokeRect(p.col*CELL+0.75,p.row*CELL+0.75,p.cols*CELL-1.5,p.rows*CELL-1.5);
  ctx.setLineDash([]);
  ctx.font='bold 9px "Space Mono",monospace';
  ctx.fillStyle='#ff6b35';ctx.textAlign='center';ctx.textBaseline='top';
  ctx.shadowColor='#000';ctx.shadowBlur=3;
  ctx.fillText('ENTER to place · ESC cancel',p.col*CELL+p.cols*CELL/2,p.row*CELL+p.rows*CELL+6);
  ctx.shadowBlur=0;
  ctx.restore();
}

// Marching ants animation for selection - only redraws when select active
var _antsLast=0;
(function marchingAnts(ts){
  requestAnimationFrame(marchingAnts);
  if(!selectActive||!selectRect)return;
  if(ts-_antsLast<50)return; // ~20fps is enough for ants
  _antsLast=ts;
  renderAll();
})(0);

function drawWASDCursor(){
  var x=cursorCol*CELL,y=cursorRow*CELL;
  ctx.save();
  ctx.strokeStyle='#ff6b35';ctx.lineWidth=3;
  ctx.strokeRect(x+1.5,y+1.5,CELL-3,CELL-3);
  ctx.strokeStyle='rgba(255,255,255,0.9)';ctx.lineWidth=1.2;
  ctx.strokeRect(x+4,y+4,CELL-8,CELL-8);
  ctx.restore();
}

/* ── Index helpers ── */
function idx(col,row){return row*COLS+col;}
function inBounds(col,row){return col>=0&&col<COLS&&row>=0&&row<ROWS;}
function colRowFromEvent(e){
  var src=(e.changedTouches&&e.changedTouches.length)?e.changedTouches[0]:e;
  var rect=canvas.getBoundingClientRect();
  return{
    col:Math.floor((src.clientX-rect.left)/rect.width*COLS),
    row:Math.floor((src.clientY-rect.top)/rect.height*ROWS),
    // raw logical pixel coords within canvas
    px:(src.clientX-rect.left)/rect.width*(COLS*CELL),
    py:(src.clientY-rect.top)/rect.height*(ROWS*CELL)
  };
}

/* ── Undo ── */
function saveHistory(){undoStack.push(pixels.slice());if(undoStack.length>80)undoStack.shift();}
function undo(){if(!undoStack.length)return;pixels=undoStack.pop();renderAll();}

/* ── Paint ── */
function paintAt(col,row){
  if(!inBounds(col,row))return;
  var i=idx(col,row);
  if(currentTool==='paint')pixels[i]=currentColor;
  else if(currentTool==='erase')pixels[i]=null;
  renderAll();schedSave();
}
function paintRegion(c1,r1,c2,r2){
  var minC=Math.max(0,Math.min(c1,c2)),maxC=Math.min(COLS-1,Math.max(c1,c2));
  var minR=Math.max(0,Math.min(r1,r2)),maxR=Math.min(ROWS-1,Math.max(r1,r2));
  for(var r=minR;r<=maxR;r++)for(var c=minC;c<=maxC;c++){
    if(currentTool==='paint')pixels[idx(c,r)]=currentColor;
    else if(currentTool==='erase')pixels[idx(c,r)]=null;
  }
  renderAll();schedSave();
}
function floodFill(col,row){
  if(!inBounds(col,row))return;
  var target=pixels[idx(col,row)]||null;
  if(target===currentColor)return;
  saveHistory();
  var stack=[[col,row]],visited=new Uint8Array(COLS*ROWS);
  while(stack.length){
    var pt=stack.pop(),c=pt[0],r=pt[1];
    if(!inBounds(c,r))continue;
    var pi=idx(c,r);
    if(visited[pi])continue;visited[pi]=1;
    if((pixels[pi]||null)!==target)continue;
    pixels[pi]=currentColor;
    stack.push([c+1,r],[c-1,r],[c,r+1],[c,r-1]);
  }
  renderAll();schedSave();
}
function eyedropAt(col,row){
  if(!inBounds(col,row)||!pixels[idx(col,row)])return;
  setColor(pixels[idx(col,row)]);
}

/* ── Color ── */
function setColor(hex){
  currentColor=hex;
  colorSwatch.style.background=hex;
  colorPicker.value=hex;
  colorHex.value=hex;
  document.querySelectorAll('.pal-swatch').forEach(function(s){s.classList.toggle('active',s.dataset.color===hex);});
}
colorPicker.addEventListener('input',function(){setColor(this.value);});
colorHex.addEventListener('keydown',function(e){if(e.key==='Enter'){var v=this.value.trim();if(/^#[0-9a-fA-F]{6}$/.test(v))setColor(v);}});
colorHex.addEventListener('blur',function(){var v=this.value.trim();if(/^#[0-9a-fA-F]{6}$/.test(v))setColor(v);});
// Color is set after buildPaletteUI in initCanvas

/* ── Palette ── */
function buildPaletteUI(){
  var pal=document.getElementById('palette');
  pal.innerHTML='';
  palette.forEach(function(c){
    var s=document.createElement('div');
    s.className='pal-swatch'+(c===currentColor?' active':'');
    s.style.background=c;
    s.dataset.color=c;
    s.title=c;
    s.addEventListener('click',function(){setColor(c);});
    s.addEventListener('contextmenu',function(e){
      e.preventDefault();
      palette=palette.filter(function(p){return p!==c;});
      // If we deleted the active color, switch to new first
      if(currentColor===c&&palette.length>0)setColor(palette[0]);
      buildPaletteUI();
    });
    pal.appendChild(s);
  });
  var wrap=document.getElementById('paletteWrap');
  wrap.scrollLeft=0;
}
document.getElementById('addPaletteBtn').addEventListener('click',function(){
  if(palette.indexOf(currentColor)<0){
    palette.unshift(currentColor);
    buildPaletteUI();
    setColor(currentColor); // keep active highlight
  }
});

/* ── Tools ── */
document.querySelectorAll('.tool-btn[data-tool]').forEach(function(btn){
  btn.addEventListener('click',function(){
    currentTool=btn.dataset.tool;
    document.querySelectorAll('.tool-btn[data-tool]').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active');
    if(currentTool==='text')document.getElementById('textPop').classList.remove('hidden');
    else{document.getElementById('textPop').classList.add('hidden');textInput.classList.add('hidden');textPending=null;}
    updateCursor();
  });
});
function setTool(name){var btn=document.querySelector('.tool-btn[data-tool="'+name+'"]');if(btn)btn.click();}
function updateCursor(){
  var map={paint:'crosshair',erase:'cell',fill:'copy',eyedrop:'zoom-in',text:'text'};
  canvas.style.cursor=viewMode?'default':(map[currentTool]||'crosshair');
}

/* ── Helper: hit-test select handles ── */
// Returns handle index (0-3 corners, 4-7 edges) or -1 or 'body'
function hitTestSelect(px,py){
  if(!selectActive||!selectRect)return null;
  var s=selectRect;
  var x=s.col*CELL,y=s.row*CELL,w=s.cols*CELL,h=s.rows*CELL;
  var HIT=CELL*0.55; // big hit area = ~half cell, very easy to grab
  // Corners (priority)
  var corners=[[x,y],[x+w,y],[x+w,y+h],[x,y+h]];
  for(var i=0;i<4;i++){
    if(Math.abs(px-corners[i][0])<HIT&&Math.abs(py-corners[i][1])<HIT)return i;
  }
  // Edge midpoints
  var edges=[[x+w/2,y],[x+w,y+h/2],[x+w/2,y+h],[x,y+h/2]];
  for(var j=0;j<4;j++){
    if(Math.abs(px-edges[j][0])<HIT&&Math.abs(py-edges[j][1])<HIT)return 4+j;
  }
  // Body (inside selection)
  if(px>=x&&px<=x+w&&py>=y&&py<=y+h)return 'body';
  return null;
}

function hitTestPaste(px,py){
  if(!pasteRect)return false;
  var x=pasteRect.col*CELL,y=pasteRect.row*CELL,w=pasteRect.cols*CELL,h=pasteRect.rows*CELL;
  return px>=x&&px<=x+w&&py>=y&&py<=y+h;
}

/* ── Mouse / Touch events ── */
function handleDown(e){
  if(viewMode)return;
  e.preventDefault();
  var cr=colRowFromEvent(e);

  // ── Paste mode: drag paste ghost or place on click ──
  if(selectMode==='pasting'&&pasteRect){
    if(hitTestPaste(cr.px,cr.py)){
      selectMode='paste-drag';
      pasteDragAnchorPx={px:cr.px,py:cr.py};
      pasteMoveInitRect={col:pasteRect.col,row:pasteRect.row,cols:pasteRect.cols,rows:pasteRect.rows};
      return;
    }
    // Click outside paste ghost = commit (but only if not starting a drag - handled in handleUp)
    _pendingPasteCommit=true;
    return;
  }

  // ── Select mode active ──
  if(selectActive){
    var hit=hitTestSelect(cr.px,cr.py);
    if(hit==='body'){
      if(moveActive){
        // Move tool: start dragging pixels
        saveHistory();
        selectMode='pixel-move';
        selectMoveDragAnchorPx={px:cr.px,py:cr.py};
        selectMoveInitRect={col:selectRect.col,row:selectRect.row,cols:selectRect.cols,rows:selectRect.rows};
        // Snapshot the pixels in the selection for live preview
        moveInitPixels=[];
        for(var mr=0;mr<selectRect.rows;mr++)for(var mc=0;mc<selectRect.cols;mc++)
          moveInitPixels.push(pixels[idx(selectRect.col+mc,selectRect.row+mr)]||null);
        return;
      }
      // Normal select: move selection box
      selectMode='moving';
      selectMoveDragAnchorPx={px:cr.px,py:cr.py};
      selectMoveInitRect={col:selectRect.col,row:selectRect.row,cols:selectRect.cols,rows:selectRect.rows};
      return;
    }
    if(hit!==null&&hit!=='body'){
      // Handle resize
      selectMode='handle';
      selectHandleIdx=hit;
      selectDragAnchorPx={px:cr.px,py:cr.py};
      selectInitRect={col:selectRect.col,row:selectRect.row,cols:selectRect.cols,rows:selectRect.rows};
      return;
    }
    // Clicked outside selection → start new draw-select
    selectMode='drawing';
    selectDrawStart={col:cr.col,row:cr.row};
    selectRect={col:cr.col,row:cr.row,cols:1,rows:1};
    renderAll();
    return;
  }

  // ── Normal tools ──
  if(currentTool==='fill'){floodFill(cr.col,cr.row);return;}
  if(currentTool==='eyedrop'){eyedropAt(cr.col,cr.row);return;}
  if(currentTool==='text'){placeTextTool(cr);return;}
  if(currentTool==='paint'||currentTool==='erase'){
    isDragSelecting=true;
    dragSelectStart={col:cr.col,row:cr.row};
    saveHistory();
    paintAt(cr.col,cr.row);
  }
}
function handleMove(e){
  if(viewMode)return;
  if(e.cancelable)e.preventDefault();
  var cr=colRowFromEvent(e);
  if(inBounds(cr.col,cr.row))coordsEl.textContent='X:'+cr.col+'  Y:'+cr.row;
  // Cancel pending paste-commit only if mouse moved and we're NOT in an active paste drag
  if(_pendingPasteCommit&&selectMode!=='paste-drag'&&selectMode!=='pixel-move')_pendingPasteCommit=false;

  // Paste drag
  if(selectMode==='paste-drag'&&pasteRect){
    var dpc=Math.round((cr.px-pasteDragAnchorPx.px)/CELL);
    var dpr2=Math.round((cr.py-pasteDragAnchorPx.py)/CELL);
    pasteRect.col=Math.max(0,Math.min(COLS-pasteMoveInitRect.cols,pasteMoveInitRect.col+dpc));
    pasteRect.row=Math.max(0,Math.min(ROWS-pasteMoveInitRect.rows,pasteMoveInitRect.row+dpr2));
    renderAll();return;
  }

  // Pixel-move drag (MOVE tool)
  if(selectMode==='pixel-move'&&moveInitPixels&&selectMoveInitRect){
    var pmdx=Math.round((cr.px-selectMoveDragAnchorPx.px)/CELL);
    var pmdy=Math.round((cr.py-selectMoveDragAnchorPx.py)/CELL);
    var ri2=selectMoveInitRect;
    var newCol=Math.max(0,Math.min(COLS-ri2.cols,ri2.col+pmdx));
    var newRow=Math.max(0,Math.min(ROWS-ri2.rows,ri2.row+pmdy));
    // Restore original pixels (erase moved area, restore any overwritten pixels)
    for(var pr2=0;pr2<ri2.rows;pr2++)for(var pc2=0;pc2<ri2.cols;pc2++)
      pixels[idx(ri2.col+pc2,ri2.row+pr2)]=null;
    // Stamp at new position
    for(var sr3=0;sr3<ri2.rows;sr3++)for(var sc3=0;sc3<ri2.cols;sc3++){
      var destC=newCol+sc3,destR=newRow+sr3;
      if(inBounds(destC,destR)&&moveInitPixels[sr3*ri2.cols+sc3]!==null)
        pixels[idx(destC,destR)]=moveInitPixels[sr3*ri2.cols+sc3];
    }
    // Update selection rect to follow
    selectRect.col=newCol;selectRect.row=newRow;
    selectRect.cols=ri2.cols;selectRect.rows=ri2.rows;
    renderAll();return;
  }

  // Draw new selection
  if(selectMode==='drawing'&&selectDrawStart){
    var c1=selectDrawStart.col,r1=selectDrawStart.row,c2=cr.col,r2=cr.row;
    selectRect={
      col:Math.max(0,Math.min(c1,c2)),
      row:Math.max(0,Math.min(r1,r2)),
      cols:Math.max(1,Math.abs(c2-c1)+1),
      rows:Math.max(1,Math.abs(r2-r1)+1)
    };
    renderAll();return;
  }

  // Move selection body
  if(selectMode==='moving'&&selectMoveInitRect){
    var dmc=Math.round((cr.px-selectMoveDragAnchorPx.px)/CELL);
    var dmr=Math.round((cr.py-selectMoveDragAnchorPx.py)/CELL);
    selectRect.col=Math.max(0,Math.min(COLS-selectMoveInitRect.cols,selectMoveInitRect.col+dmc));
    selectRect.row=Math.max(0,Math.min(ROWS-selectMoveInitRect.rows,selectMoveInitRect.row+dmr));
    selectRect.cols=selectMoveInitRect.cols;selectRect.rows=selectMoveInitRect.rows;
    renderAll();return;
  }

  // Handle resize (smooth pixel-based)
  if(selectMode==='handle'&&selectInitRect){
    var ddx=cr.px-selectDragAnchorPx.px,ddy=cr.py-selectDragAnchorPx.py;
    var ddc=Math.round(ddx/CELL),ddr=Math.round(ddy/CELL);
    var ri=selectInitRect;
    var nc=ri.col,nr=ri.row,nw=ri.cols,nh=ri.rows;
    var hi=selectHandleIdx;
    if(hi===0){nc=ri.col+ddc;nr=ri.row+ddr;nw=ri.cols-ddc;nh=ri.rows-ddr;}
    else if(hi===1){nr=ri.row+ddr;nw=ri.cols+ddc;nh=ri.rows-ddr;}
    else if(hi===2){nw=ri.cols+ddc;nh=ri.rows+ddr;}
    else if(hi===3){nc=ri.col+ddc;nw=ri.cols-ddc;nh=ri.rows+ddr;}
    else if(hi===4){nr=ri.row+ddr;nh=ri.rows-ddr;}
    else if(hi===5){nw=ri.cols+ddc;}
    else if(hi===6){nh=ri.rows+ddr;}
    else if(hi===7){nc=ri.col+ddc;nw=ri.cols-ddc;}
    nw=Math.max(1,nw);nh=Math.max(1,nh);
    nc=Math.max(0,Math.min(COLS-nw,nc));
    nr=Math.max(0,Math.min(ROWS-nh,nr));
    nw=Math.min(COLS-nc,nw);nh=Math.min(ROWS-nr,nh);
    selectRect={col:nc,row:nr,cols:nw,rows:nh};
    renderAll();return;
  }

  if(!isDragSelecting)return;
  if((currentTool==='paint'||currentTool==='erase')&&dragSelectStart){
    paintRegion(dragSelectStart.col,dragSelectStart.row,cr.col,cr.row);
  }
}
function handleUp(){
  isDragSelecting=false;lastPainted=-1;
  if(_pendingPasteCommit){
    _pendingPasteCommit=false;
    commitPaste();
    return;
  }
  if(selectMode==='pixel-move'){
    // Commit the move - just save history now (pixels already updated live)
    schedSave();
    selectMode='idle';
    moveInitPixels=null;
    updateCopyPasteBtns();
    return;
  }
  if(selectMode==='drawing'||selectMode==='handle'||selectMode==='moving'||selectMode==='paste-drag'){
    selectMode='idle';
    updateCopyPasteBtns();
  }
}

canvas.addEventListener('mousedown',handleDown);
canvas.addEventListener('mousemove',handleMove);
canvas.addEventListener('mouseup',handleUp);
canvas.addEventListener('mouseleave',function(){isDragSelecting=false;coordsEl.textContent='—';});
canvas.addEventListener('touchstart',function(e){handleDown(e);},{passive:false});
canvas.addEventListener('touchmove',function(e){handleMove(e);},{passive:false});
canvas.addEventListener('touchend',function(e){handleUp(e);},{passive:false});

/* ── WASD keyboard ── */
document.addEventListener('keydown',function(e){
  var tag=document.activeElement?document.activeElement.tagName:'';
  if(tag==='INPUT'||tag==='TEXTAREA')return;
  // Paste mode: Enter to commit, Escape to cancel
  if(selectMode==='pasting'||selectMode==='paste-drag'){
    if(e.key==='Enter'){e.preventDefault();commitPaste();return;}
    if(e.key==='Escape'){e.preventDefault();cancelPaste();return;}
  }
  if(e.key==='Escape'&&selectActive){e.preventDefault();
    selectActive=false;selectRect=null;selectMode='idle';
    document.getElementById('selectToggleBtn').classList.remove('active');
    document.getElementById('copyBtn').style.display='none';
    document.getElementById('pasteBtn').style.display='none';
    renderAll();return;
  }
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();return;}
  if((e.ctrlKey||e.metaKey)&&e.key==='c'&&selectActive&&selectRect){e.preventDefault();document.getElementById('copyBtn').click();return;}
  if((e.ctrlKey||e.metaKey)&&e.key==='v'&&clipboard){e.preventDefault();document.getElementById('pasteBtn').click();return;}
  // < > pan left/right,  pan up/down with [ ]
  if(e.key==='<'||e.key===','){vpX+=Math.round(COLS*CELL*vpScale*0.25);applyTransform();return;}
  if(e.key==='>'||e.key==='.'){vpX-=Math.round(COLS*CELL*vpScale*0.25);applyTransform();return;}
  if(e.key==='['||e.key==='{'){vpY+=Math.round(ROWS*CELL*vpScale*0.25);applyTransform();return;}
  if(e.key===']'||e.key==='}'){vpY-=Math.round(ROWS*CELL*vpScale*0.25);applyTransform();return;}
  var key=e.key,moved=false;
  if(key==='w'||key==='W'||key==='ArrowUp'){cursorRow=Math.max(0,cursorRow-1);moved=true;}
  if(key==='s'||key==='S'||key==='ArrowDown'){cursorRow=Math.min(ROWS-1,cursorRow+1);moved=true;}
  if(key==='a'||key==='A'||key==='ArrowLeft'){cursorCol=Math.max(0,cursorCol-1);moved=true;}
  if(key==='d'||key==='D'||key==='ArrowRight'){cursorCol=Math.min(COLS-1,cursorCol+1);moved=true;}
  if(moved){e.preventDefault();cursorVisible=true;coordsEl.textContent='X:'+cursorCol+'  Y:'+cursorRow;renderAll();return;}
  if(key==='e'||key==='E'){
    e.preventDefault();
    if(!cursorVisible){cursorVisible=true;renderAll();return;}
    if(currentTool==='paint'||currentTool==='erase'){saveHistory();paintAt(cursorCol,cursorRow);}
    else if(currentTool==='fill')floodFill(cursorCol,cursorRow);
    return;
  }
  var toolMap={p:'paint',r:'erase',f:'fill',k:'eyedrop',t:'text'};
  if(!e.ctrlKey&&!e.metaKey&&toolMap[key.toLowerCase()])setTool(toolMap[key.toLowerCase()]);
});

/* ── Text Tool ── */
document.getElementById('textFontSize').addEventListener('input',function(){textFontSize=+this.value;document.getElementById('textFontSizeVal').textContent=textFontSize;});
document.getElementById('textColorPick').addEventListener('input',function(){textColor=this.value;});
document.getElementById('textPopClose').addEventListener('click',function(){document.getElementById('textPop').classList.add('hidden');});

function placeTextTool(cr){
  textPending=cr;
  var wrapRect=canvasWrap.getBoundingClientRect();
  var areaRect=canvasArea.getBoundingClientRect();
  var cellPx=CELL*vpScale;
  textInput.style.left=(wrapRect.left-areaRect.left+cr.col*cellPx)+'px';
  textInput.style.top=(wrapRect.top-areaRect.top+cr.row*cellPx)+'px';
  textInput.classList.remove('hidden');textInput.value='';textInput.focus();
}
function commitText(){
  if(textPending&&textInput.value.trim()){saveHistory();renderTextOnCanvas(textPending.col,textPending.row,textInput.value.trim());}
  textInput.classList.add('hidden');textInput.value='';textPending=null;
}
textInput.addEventListener('keydown',function(e){if(e.key==='Enter')commitText();if(e.key==='Escape'){textInput.classList.add('hidden');textInput.value='';textPending=null;}});
textInput.addEventListener('blur',commitText);

function renderTextOnCanvas(startCol,startRow,text){
  var offW=COLS*CELL,offH=ROWS*CELL;
  var off=document.createElement('canvas');off.width=offW;off.height=offH;
  var oc=off.getContext('2d');
  oc.font=textFontSize+'px "Silkscreen",monospace';
  oc.fillStyle=textColor;oc.textBaseline='top';
  oc.fillText(text,startCol*CELL,startRow*CELL);
  var d=oc.getImageData(0,0,offW,offH).data;
  for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++){
    var sx=Math.round(c*CELL+CELL/2),sy=Math.round(r*CELL+CELL/2),pi=(sy*offW+sx)*4;
    if(d[pi+3]>60)pixels[idx(c,r)]=rgbToHex(d[pi],d[pi+1],d[pi+2]);
  }
  renderAll();
}
function rgbToHex(r,g,b){return'#'+('0'+r.toString(16)).slice(-2)+('0'+g.toString(16)).slice(-2)+('0'+b.toString(16)).slice(-2);}

/* ── Undo / Clear ── */
document.getElementById('unpaintBtn').addEventListener('click',function(){undo();schedSave();});
document.getElementById('clearBtn').addEventListener('click',function(){
  if(!confirm('Clear canvas?'))return;
  saveHistory();pixels.fill(null);selectRect=null;selectMode='idle';pasteRect=null;renderAll();schedSave();
});

/* ── Zoom ── */
document.getElementById('zoomInBtn').addEventListener('click',function(){setZoom(vpScale*1.5);});
document.getElementById('zoomOutBtn').addEventListener('click',function(){setZoom(vpScale/1.5);});
document.getElementById('zoomFitBtn').addEventListener('click',autoFitZoom);
document.getElementById('panLeftBtn').addEventListener('click',function(){vpX+=Math.round(COLS*CELL*vpScale*0.25);applyTransform();});
document.getElementById('panRightBtn').addEventListener('click',function(){vpX-=Math.round(COLS*CELL*vpScale*0.25);applyTransform();});
document.getElementById('panUpBtn').addEventListener('click',function(){vpY+=Math.round(ROWS*CELL*vpScale*0.25);applyTransform();});
document.getElementById('panDownBtn').addEventListener('click',function(){vpY-=Math.round(ROWS*CELL*vpScale*0.25);applyTransform();});
function setZoom(z){vpScale=Math.max(0.25,Math.min(40,z));centerCanvas();}
canvasArea.addEventListener('wheel',function(e){e.preventDefault();setZoom(vpScale*(e.deltaY<0?1.15:1/1.15));},{passive:false});

/* Pan */
var panOn=false,panStart={x:0,y:0},panVp={x:0,y:0},spaceDown=false;
document.addEventListener('keydown',function(e){if(e.code==='Space'&&document.activeElement.tagName!=='INPUT'&&document.activeElement.tagName!=='TEXTAREA'){spaceDown=true;canvasArea.style.cursor='grab';e.preventDefault();}});
document.addEventListener('keyup',function(e){if(e.code==='Space'){spaceDown=false;canvasArea.style.cursor='';}});
canvasArea.addEventListener('mousedown',function(e){if(e.button===1||spaceDown){panOn=true;panStart={x:e.clientX,y:e.clientY};panVp={x:vpX,y:vpY};canvasArea.style.cursor='grabbing';e.preventDefault();}});
document.addEventListener('mousemove',function(e){if(!panOn)return;vpX=panVp.x+(e.clientX-panStart.x);vpY=panVp.y+(e.clientY-panStart.y);applyTransform();});
document.addEventListener('mouseup',function(){if(panOn){panOn=false;canvasArea.style.cursor='';}});

/* ── Ghost ── */
document.getElementById('ghostBtn').addEventListener('click',function(){
  if(ghostData){ghostData=null;this.classList.remove('active');}
  else{ghostData=pixels.slice();this.classList.add('active');}
  renderAll();
});

/* ── SELECT ── */
function updateCopyPasteBtns(){
  var hasSel=selectActive&&selectRect;
  document.getElementById('copyBtn').style.opacity=hasSel?'1':'0.35';
  document.getElementById('copyBtn').style.pointerEvents=hasSel?'':'none';
  document.getElementById('pasteBtn').style.opacity=clipboard?'1':'0.35';
  document.getElementById('pasteBtn').style.pointerEvents=clipboard?'':'none';
  document.getElementById('moveToggleBtn').classList.toggle('active',moveActive);
}

document.getElementById('selectToggleBtn').addEventListener('click',function(){
  selectActive=!selectActive;
  this.classList.toggle('active',selectActive);
  if(!selectActive){
    selectRect=null;selectMode='idle';pasteRect=null;
    // Turn off move too when select is turned off
    moveActive=false;
    document.getElementById('moveToggleBtn').classList.remove('active');
  } else {
    coordsEl.textContent='Drag to draw selection';
  }
  updateCopyPasteBtns();
  renderAll();
});

document.getElementById('moveToggleBtn').addEventListener('click',function(){
  if(!selectActive||!selectRect){
    showToast('Draw a selection first');return;
  }
  moveActive=!moveActive;
  this.classList.toggle('active',moveActive);
  if(moveActive)coordsEl.textContent='Drag selection to move pixels';
  updateCopyPasteBtns();
});

document.getElementById('copyBtn').addEventListener('click',function(){
  if(!selectActive||!selectRect)return;
  var s=selectRect;
  var cp=[];
  for(var r=0;r<s.rows;r++)for(var c=0;c<s.cols;c++)cp.push(pixels[idx(s.col+c,s.row+r)]||null);
  clipboard={cols:s.cols,rows:s.rows,pixels:cp};
  updateCopyPasteBtns();
  showToast('Copied '+s.cols+'×'+s.rows);
});

document.getElementById('pasteBtn').addEventListener('click',function(){
  if(!clipboard)return;
  // Start paste in centre of canvas
  pasteRect={
    col:Math.max(0,Math.floor((COLS-clipboard.cols)/2)),
    row:Math.max(0,Math.floor((ROWS-clipboard.rows)/2)),
    cols:clipboard.cols,rows:clipboard.rows
  };
  selectMode='pasting';
  renderAll();
  showToast('Drag to position · ENTER to place · ESC cancel');
});

function commitPaste(){
  if(!clipboard||!pasteRect)return;
  saveHistory();
  for(var r=0;r<clipboard.rows;r++)for(var c=0;c<clipboard.cols;c++){
    var tc=pasteRect.col+c,tr=pasteRect.row+r;
    if(!inBounds(tc,tr))continue;
    if(clipboard.pixels[r*clipboard.cols+c]!==null)pixels[idx(tc,tr)]=clipboard.pixels[r*clipboard.cols+c];
  }
  pasteRect=null;selectMode='idle';
  renderAll();schedSave();showToast('Pasted!');
}

function cancelPaste(){
  pasteRect=null;selectMode='idle';renderAll();
}

/* ── Mode ── */
document.getElementById('editModeBtn').addEventListener('click',function(){
  viewMode=false;this.classList.add('active');
  document.getElementById('viewModeBtn').classList.remove('active');
  document.body.classList.remove('view-mode');renderAll();updateCursor();
});
document.getElementById('viewModeBtn').addEventListener('click',function(){
  viewMode=true;this.classList.add('active');
  document.getElementById('editModeBtn').classList.remove('active');
  document.body.classList.add('view-mode');cursorVisible=false;renderAll();canvas.style.cursor='default';
});

/* ── New ── */
document.getElementById('newBtn').addEventListener('click',function(){
  if(!confirm('Start a new canvas? Unsaved work will be lost.'))return;
  ghostData=null;document.getElementById('ghostBtn').classList.remove('active');
  document.getElementById('setupModal').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
});

/* ═══════════════════════════════════════════
   EXPORT  (PNG + SVG only, no PDF)
═══════════════════════════════════════════ */
var exportMenu=document.getElementById('exportMenu');
document.getElementById('exportBtn').addEventListener('click',function(e){e.stopPropagation();exportMenu.classList.toggle('open');});
document.addEventListener('click',function(){exportMenu.classList.remove('open');});

function getExportRegion(){
  // Use select rect if active, otherwise full canvas
  if(selectActive&&selectRect){
    return{sc:selectRect.col,sr:selectRect.row,cols:selectRect.cols,rows:selectRect.rows};
  }
  return{sc:0,sr:0,cols:COLS,rows:ROWS};
}

function getExportCanvas(scale){
  var reg=getExportRegion(),sc=reg.sc,sr=reg.sr,cols=reg.cols,rows=reg.rows;
  var ec=document.createElement('canvas');
  ec.width=cols*scale;ec.height=rows*scale;
  var ex=ec.getContext('2d');
  ex.imageSmoothingEnabled=false;
  ex.fillStyle='#ffffff';ex.fillRect(0,0,ec.width,ec.height);
  for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){
    var pi=idx(sc+c,sr+r);if(!pixels[pi])continue;
    ex.fillStyle=pixels[pi];ex.fillRect(c*scale,r*scale,scale,scale);
  }
  return ec;
}

document.getElementById('exportPNG').addEventListener('click',function(){
  exportMenu.classList.remove('open');
  var reg=getExportRegion();
  var scale;
  if(selectActive&&selectRect){
    // Selection active: scale up to at least 512px for quality
    scale=Math.max(1,Math.ceil(512/Math.max(reg.cols,reg.rows)));
  } else {
    // No selection: export 1:1, one pixel per cell
    scale=1;
  }
  getExportCanvas(scale).toBlob(function(b){triggerDownload(URL.createObjectURL(b),'pixel-art.png');});
});
document.getElementById('exportSVG').addEventListener('click',function(){
  exportMenu.classList.remove('open');
  var reg=getExportRegion(),sc=reg.sc,sr=reg.sr,cols=reg.cols,rows=reg.rows;
  var parts=['<svg xmlns="http://www.w3.org/2000/svg" width="'+cols+'" height="'+rows+'" viewBox="0 0 '+cols+' '+rows+'"><rect width="'+cols+'" height="'+rows+'" fill="#fff"/>'];
  for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){
    var pi=idx(sc+c,sr+r);if(!pixels[pi])continue;
    parts.push('<rect x="'+c+'" y="'+r+'" width="1" height="1" fill="'+pixels[pi]+'"/>');
  }
  parts.push('</svg>');
  triggerDownload(URL.createObjectURL(new Blob([parts.join('\n')],{type:'image/svg+xml'})),'pixel-art.svg');
});
function triggerDownload(url,name){var a=document.createElement('a');a.href=url;a.download=name;a.click();setTimeout(function(){URL.revokeObjectURL(url);},1000);}

/* ═══════════════════════════════════════════
   LIBRARY
═══════════════════════════════════════════ */
document.getElementById('libraryBtn').addEventListener('click',function(){buildLibraryUI();document.getElementById('libraryModal').classList.remove('hidden');});
document.getElementById('libCloseBtn').addEventListener('click',function(){document.getElementById('libraryModal').classList.add('hidden');});

document.getElementById('libConfirmImport').addEventListener('click',function(){
  var raw=document.getElementById('libJsonArea').value.trim();
  if(!raw)return;
  // Check if it looks like a URL
  if(/^https?:\/\//i.test(raw)){
    fetch(raw)
      .then(function(res){if(!res.ok)throw new Error('HTTP '+res.status);return res.json();})
      .then(function(data){loadFromData(data);document.getElementById('libraryModal').classList.add('hidden');showToast('Loaded from URL!');})
      .catch(function(err){alert('Failed to load URL: '+err.message);});
  } else {
    try{var data=JSON.parse(raw);loadFromData(data);document.getElementById('libraryModal').classList.add('hidden');}
    catch(ex){alert('Invalid JSON: '+ex.message);}
  }
});

function buildLibraryUI(){
  var grid=document.getElementById('libGrid');grid.innerHTML='';
  if(!library.length){grid.innerHTML='<div style="color:var(--muted);font-size:11px;grid-column:1/-1;padding:16px;">No sprites yet. Use PUSH to save.</div>';return;}
  library.forEach(function(item,i){
    var div=document.createElement('div');div.className='lib-item';div.style.position='relative';
    var tc=document.createElement('canvas');tc.width=item.cols;tc.height=item.rows;
    tc.style.cssText='width:'+Math.min(80,item.cols*3)+'px;height:'+Math.min(80,item.rows*3)+'px;image-rendering:pixelated;display:block;margin:0 auto 6px;background:#fff;border:1px solid rgba(0,0,0,0.1);';
    var tx=tc.getContext('2d');
    for(var pi=0;pi<item.pixels.length;pi++){if(!item.pixels[pi])continue;tx.fillStyle=item.pixels[pi];tx.fillRect(pi%item.cols,Math.floor(pi/item.cols),1,1);}
    var nm=document.createElement('div');nm.className='lib-item-name';nm.textContent=item.name;
    var del=document.createElement('button');del.textContent='x';del.style.cssText='position:absolute;top:4px;right:4px;background:none;border:none;color:var(--danger);cursor:pointer;font-size:14px;line-height:1;';
    div.appendChild(tc);div.appendChild(nm);div.appendChild(del);
    div.addEventListener('click',(function(d){return function(){loadFromData(d);document.getElementById('libraryModal').classList.add('hidden');};})(item));
    del.addEventListener('click',(function(ii){return function(e){e.stopPropagation();library.splice(ii,1);buildLibraryUI();saveLibraryDB();};})(i));
    grid.appendChild(div);
  });
}
function loadFromData(data){
  COLS=data.cols;ROWS=data.rows;pixels=data.pixels.slice();
  ghostData=null;selectRect=null;undoStack=[];
  autoFitZoom();renderAll();buildPaletteUI();
}

/* ═══════════════════════════════════════════
   PUSH — compact JSON (RLE for nulls)
   Format: pixels stored as array where consecutive nulls become ["null",count]
═══════════════════════════════════════════ */
function compressPixels(arr){
  var out=[],i=0;
  while(i<arr.length){
    if(arr[i]===null){
      var cnt=0;
      while(i<arr.length&&arr[i]===null){cnt++;i++;}
      out.push(cnt===1?null:[null,cnt]); // single null stays as null, run becomes [null,count]
    } else {
      out.push(arr[i]);i++;
    }
  }
  return out;
}
function decompressPixels(arr,total){
  var out=[];
  for(var i=0;i<arr.length;i++){
    var v=arr[i];
    if(v===null){out.push(null);}
    else if(Array.isArray(v)&&v[0]===null){for(var j=0;j<v[1];j++)out.push(null);}
    else{out.push(v);}
  }
  // Pad/truncate to total
  while(out.length<total)out.push(null);
  return out.slice(0,total);
}

document.getElementById('pushBtn').addEventListener('click',function(){
  var reg=getExportRegion(),sc=reg.sc,sr=reg.sr,cols=reg.cols,rows=reg.rows;
  var slice=[];
  for(var r=0;r<rows;r++)for(var c=0;c<cols;c++)slice.push(pixels[idx(sc+c,sr+r)]||null);
  var compressed=compressPixels(slice);
  var data={name:'sprite',cols:cols,rows:rows,pixels:compressed};
  document.getElementById('pushJson').value=JSON.stringify(data,null,2);
  document.getElementById('pushName').value='';
  document.getElementById('pushModal').classList.remove('hidden');
});
document.getElementById('pushCloseBtn').addEventListener('click',function(){document.getElementById('pushModal').classList.add('hidden');});
document.getElementById('pushCopyBtn').addEventListener('click',function(){
  var ta=document.getElementById('pushJson');
  if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(ta.value).then(function(){showToast('Copied!');});
  else{ta.select();document.execCommand('copy');showToast('Copied!');}
});
document.getElementById('pushSaveBtn').addEventListener('click',function(){
  var name=document.getElementById('pushName').value.trim()||'sprite';
  try{
    var data=JSON.parse(document.getElementById('pushJson').value);
    data.name=name;
    // Decompress before storing in memory for easy preview
    var decompressed=decompressPixels(data.pixels,data.cols*data.rows);
    library.push({name:name,cols:data.cols,rows:data.rows,pixels:decompressed});
    saveLibraryDB();
    document.getElementById('pushModal').classList.add('hidden');showToast('Saved!');
  }catch(ex){}
});

/* ═══════════════════════════════════════════
   IndexedDB
═══════════════════════════════════════════ */
var _db=null;
(function initDB(){
  var req=indexedDB.open('PixelForgeDB',3);
  req.onupgradeneeded=function(e){
    var db=e.target.result;
    if(!db.objectStoreNames.contains('state'))db.createObjectStore('state');
    if(!db.objectStoreNames.contains('library'))db.createObjectStore('library');
  };
  req.onsuccess=function(e){_db=e.target.result;loadStateDB();loadLibraryDB();};
})();
function saveStateDB(){
  if(!_db)return;
  _db.transaction('state','readwrite').objectStore('state').put({cols:COLS,rows:ROWS,pixels:pixels.slice(),palette:palette.slice()},'current');
}
function loadStateDB(){
  if(!_db)return;
  var req=_db.transaction('state','readonly').objectStore('state').get('current');
  req.onsuccess=function(e){
    var s=e.target.result;
    if(s){
      document.getElementById('setupModal').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      COLS=s.cols;ROWS=s.rows;
      pixels=s.pixels||new Array(COLS*ROWS).fill(null);
      palette=s.palette||palette;
      autoFitZoom();renderAll();buildPaletteUI();
      setColor(palette[0]||'#111111');
      updateCopyPasteBtns();
    }
  };
}
function saveLibraryDB(){if(!_db)return;_db.transaction('library','readwrite').objectStore('library').put(library,'lib');}
function loadLibraryDB(){
  if(!_db)return;
  var req=_db.transaction('library','readonly').objectStore('library').get('lib');
  req.onsuccess=function(e){if(e.target.result)library=e.target.result;};
}
var saveTimer=null;
function schedSave(){clearTimeout(saveTimer);saveTimer=setTimeout(saveStateDB,800);}

/* ── Toast ── */
var toastEl=null;
function showToast(msg){
  if(!toastEl){toastEl=document.createElement('div');toastEl.style.cssText='position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:#111;border:1px solid var(--accent);color:var(--accent);font-family:"Silkscreen",monospace;font-size:11px;padding:8px 18px;border-radius:3px;z-index:9999;letter-spacing:1px;pointer-events:none;transition:opacity .3s;';document.body.appendChild(toastEl);}
  toastEl.textContent=msg;toastEl.style.opacity='1';
  clearTimeout(toastEl._t);toastEl._t=setTimeout(function(){toastEl.style.opacity='0';},2200);
}

/* ── Resize ── */
window.addEventListener('resize',function(){if(!document.getElementById('app').classList.contains('hidden'))centerCanvas();});
